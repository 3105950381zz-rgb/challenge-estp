<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>挽回 ESTP 挑战</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a0f0a;color:#f0ece4;min-height:100vh;overflow-x:hidden}

/* Animated bg */
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 30% 20%,rgba(249,115,22,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(234,88,12,.04),transparent 50%),#1a0f0a}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;background:rgba(249,115,22,.2);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Screen shake */
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
.shake{animation:shake .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .4s ease}

/* ===== HEADER ===== */
.hd{text-align:center;padding:32px 20px 20px;position:relative}
.hd-badge{display:inline-block;padding:3px 12px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(249,115,22,.1);color:#f97316;letter-spacing:1px;margin-bottom:10px;border:1px solid rgba(249,115,22,.15)}
.hd h1{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f0ece4,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:12px;color:rgba(240,236,228,.3);margin-top:6px}

.ct{max-width:480px;margin:0 auto;padding:0 14px 30px}

/* ===== HOME ===== */
.home{text-align:center;padding:20px 0}
.home-icon{font-size:72px;margin-bottom:12px;display:block}
.home-sub{font-size:13px;color:rgba(240,236,228,.4);margin-bottom:4px;letter-spacing:1px}
.home-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#f0ece4}
.home-desc{font-size:12px;color:rgba(240,236,228,.3);line-height:1.7;margin:8px 0 20px;padding:0 10px}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.home-stats span{padding:4px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);font-size:11px;color:rgba(240,236,228,.4)}

/* ===== BUTTON ===== */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 4px 20px rgba(249,115,22,.2)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(249,115,22,.3)}
.btn-second{background:rgba(255,255,255,.03);color:rgba(240,236,228,.4);border:1px solid rgba(255,255,255,.06)}
.btn-danger{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}

/* ===== CARD ===== */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#f97316,transparent);opacity:.5}

/* LEVEL HEADER */
.lv-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lv-name{font-size:11px;font-weight:600;color:rgba(249,115,22,.8);letter-spacing:1px}
.lv-progress{font-size:10px;color:rgba(240,236,228,.3)}

.lv-scene{font-size:13px;color:rgba(240,236,228,.5);line-height:1.7;margin-bottom:12px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border-left:2px solid rgba(249,115,22,.3)}
.lv-line{font-size:15px;font-weight:600;color:#f0ece4;margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.04)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{width:100%;padding:13px 14px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.02);font-size:13px;color:#f0ece4;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.4}
.opt:hover{border-color:rgba(249,115,22,.2);background:rgba(249,115,22,.04)}
.opt:active{transform:scale(.97)}
.opt .il{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;font-size:10px;font-weight:700;margin-right:10px;color:#fff}
.opt .s1{background:#f97316}.opt .s2{background:#ea580c}.opt .s3{background:#c2410c}.opt .s4{background:#fb923c}
.opt.wrong{animation:shake .5s;border-color:#e94560;background:rgba(233,69,96,.08)!important}
.opt.right{border-color:#4caf50;background:rgba(76,175,80,.08)!important}

/* ===== GAME OVER ===== */
.go-screen{text-align:center;padding:30px 0;max-width:400px;margin:0 auto}
.go-icon{font-size:72px;margin-bottom:10px;display:block}
.go-title{font-size:24px;font-weight:800;color:#e94560;margin-bottom:4px}
.go-sub{font-size:12px;color:rgba(240,236,228,.3);margin-bottom:16px}
.go-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(233,69,96,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #e94560}
.go-qr{margin:16px auto;width:180px;height:180px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.06)}
.go-qr img{width:100%;height:100%;object-fit:cover;display:block}
.go-brand{font-size:11px;color:rgba(240,236,228,.2);margin-bottom:20px;letter-spacing:1px}

/* ===== WIN ===== */
.win-screen{text-align:center;padding:20px 0}
.win-icon{font-size:72px;margin-bottom:10px;display:block}
.win-title{font-size:24px;font-weight:800;color:#f97316;margin-bottom:4px}
.win-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(249,115,22,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #f97316}
.win-qr{margin:16px auto;width:180px;height:180px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.06)}
.win-qr img{width:100%;height:100%;object-fit:cover;display:block}
.win-brand{font-size:11px;color:rgba(240,236,228,.2);margin-bottom:16px;letter-spacing:1px}

/* BRAND */
.brand{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-top:12px}
.brand img{width:72px;height:72px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(255,255,255,.06)}
.brand .bn{font-size:14px;font-weight:700;color:#f0ece4;letter-spacing:2px}
.brand .bs{font-size:10px;color:rgba(240,236,228,.25);margin-top:3px;line-height:1.5}
.ft{font-size:9px;color:rgba(240,236,228,.15);text-align:center;margin-top:16px;line-height:1.6}

.stats-box{margin-bottom:16px;padding:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px}
.stats-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.stats-level{font-size:15px;font-weight:700;color:#f0ece4}
.stats-pct{font-size:14px;font-weight:800;background:linear-gradient(135deg,#feca57,#ff9ff3);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-track{height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:6px}
.stats-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#feca57,#ff9ff3);transition:width 1s ease}
.stats-info{font-size:10px;color:rgba(240,236,228,.25);display:flex;justify-content:space-between}
.stats-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(254,202,87,.08);color:#feca57;margin-left:4px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:10px;background:#1a1218;border:1px solid rgba(255,255,255,.06);font-size:13px;color:#f0ece4;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:999;opacity:0;transition:all .4s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="hd">
  <div class="hd-badge">✦ 挽回挑战</div>
  <h1>挽回 ESTP</h1>
  <p>只有一次机会，选错就输了</p>
</div>

<div class="ct" id="app"></div>

<script>
// Particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}
})();

const DATA={
  emoji:'🔥',title:'ESTP',subtitle:'大胆冒险的行动派',
  desc:'ESTP 要刺激、要新鲜、要当下。当你变得无趣、犹豫、拖泥带水，TA对你的兴趣就像一个过时的游戏——不想再打开了。',
  color:'#f97316',qrSrc:'qrcode.jpg',
  winDesc:'你重新变得有趣了。ESTP看到了你的行动力和冒险精神。你不再犹豫不决，而是敢跟TA一起疯。TA对你重新燃起了兴趣——因为好玩的人不多了。',difficulty:'★★★★☆',diffLabel:'冒险型 · 需要刺激和挑战',dist:[100,95,89,81,71,60,48,37,26,17,10,5,1.5]};

const STAGES=[{scene:"你说周末宅家TA说好但眼神失望",line:"那好吧。",options:["骗你的 我早订好地方了 走不走","累了一周了在家好好休息不好吗","你看你那个眼神 说吧想去哪","宅家多舒服 你别不知足"],safe:1,death:"好 跟你在家无聊 不如一个人精彩"},{scene:"你犹豫不决问TA意见",line:"随便你。",options:["你别随便啊 你帮我选一个嘛","那你觉得A好还是B好","你是不是懒得跟我一起了","那就听我的 我们去做这个 保证好玩"],safe:4,death:"随便你 你的犹豫让TA觉得你没意思"},{scene:"TA约你蹦极你说恐高",line:"那算了。",options:["我真的恐高 你找别人陪你吧","恐高但是我想试试 有你在我不怕","蹦极太危险了 我们换个安全点的玩","你自己去跳吧 我在下面给你拍照"],safe:2,death:"TA跟别人去了 你跟TA的差距拉大了"},{scene:"你吃醋TA跟别人玩得开心",line:"朋友而已。",options:["玩得开心就行 下次带上我 我也想认识你朋友","我不爽但你自己把握","你跟TA们玩得比跟我开心多了","你少跟那些人混在一起"],safe:1,death:"你生气 TA觉得你不大方不好玩"},{scene:"TA说走就走你没跟上",line:"要来吗？",options:["等我一下 我换个衣服","现在就走？会不会太赶了","你先去 我等会找你来","来啊 走"],safe:4,death:"你犹豫 TA已经走了 不等人的"},{scene:"TA说生活没激情了",line:"有点无聊。",options:["生活不就这样吗 平平淡淡才是真","走 我带你去找点刺激的 你想怎么玩","无聊就找点事做啊 跟我说有什么用","你是不是觉得跟我在一起无聊了"],safe:2,death:"无聊的不是生活 是你"},{scene:"TA在派对上跟别人玩不带你",line:"一起啊。",options:["你朋友挺有意思的 介绍我认识一下","你过来 我带你玩更好玩的","你玩你的 不用管我","你跟TA们聊什么呢聊那么开心"],safe:1,death:"你甩脸色 TA觉得你没社交价值"},{scene:"TA说想尝试开放式关系",line:"你怎么看？",options:["你是不是不爱我了","你在开玩笑吧","我不接受 但我欣赏你敢这么直接跟我说","好啊 那我也试试"],safe:3,death:"你慌 TA觉得你不够自信"},{scene:"TA开始频繁更新动态但没有你",line:"好玩。",options:["你最近都不发关于我的了","你能不能别老发这些","你最近挺爱刷存在感的嘛","你这张拍得不错 下次我给你拍更好的"],safe:4,death:"你问为什么不拍你 TA说你在旁边玩手机"},{scene:"TA说你变得没挑战了",line:"没意思。",options:["我对你没挑战了那你去找有挑战的啊","那你等着 我会让你重新觉得我有意思的","没意思就分吧","你想要什么挑战你说"],safe:2,death:"没意思 你被归类为通关过的游戏"},{scene:"TA约你去旅行你说要请假看",line:"你请得到吗？",options:["你在挑战我？好 我请给你看","我回去看看好不好请假","下周末吧 这周来不及","请假太难了 换个周末行不行"],safe:1,death:"你说下周 TA说下周有下周的事包括下周找别人"},{scene:"TA说对你没感觉了",line:"感觉没了。",options:["你这样说我很伤心","感觉是可以重新培养的 你再给我个机会","行 那就到这吧","怎样才有感觉 你说 我做给你看"],safe:4,death:"你挽留 TA说感觉不是要回来的 是要重新有的"}];

let cur=0,over=false;
const A=document.getElementById('app');
const LABELS=['A','B','C','D'];
const SK='mbti_wb';
function ls(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function sv(t,l,w){const a=ls();if(!a[t]||a[t].best<l){a[t]={best:l,won:w,date:Date.now()}}a[t].plays=(a[t].plays||0)+1;localStorage.setItem(SK,JSON.stringify(a))}
function pct(l){const d=DATA.dist;return Math.round((100-(d[Math.min(Math.max(l-1,0),d.length-1)]||0))*10)/10}
function statsHTML(level){
  const p=pct(level);
  return '<div class="stats-box">'
    +'<div class="stats-row"><span class="stats-level">🏆 闯到第 '+level+'/12 关</span><span class="stats-pct">超过 '+p+'% 的挑战者</span></div>'
    +'<div class="stats-track"><div class="stats-fill" style="width:'+p+'%"></div></div>'
    +'<div class="stats-info"><span>📊 基于挑战者数据</span><span>'+DATA.difficulty+' <span class="stats-badge">'+DATA.diffLabel+'</span></span></div>'
    +'</div>';
}
function pbHTML(){
  const a=ls()[DATA.title];
  if(!a)return'';
  const p=pct(a.best);
  return'<div style="font-size:11px;color:rgba(240,236,228,.25);margin-bottom:16px;text-align:center">🏅 个人最佳：第 '+a.best+'/12 关 · 曾超过 '+p+'% 的挑战者</div>';
}

function hm(){
  A.innerHTML=`<div class="home">
    <span class="home-icon">${DATA.emoji}</span>
    <div class="home-sub">挽回挑战 · 只有一次机会</div>
    <div class="home-title">挽回 ${DATA.title}</div>
    <div class="home-desc">${DATA.desc}</div>
    <div class="home-stats">
      <span>💀 选错即输</span>
      <span>🏆 共${STAGES.length}关</span>
      <span>${DATA.difficulty}</span>
    </div>
    ${pbHTML()}
    <button class="btn btn-primary" onclick="go()">▶ 开始挑战</button>
    <div style="height:6px"></div>
    <button class="btn btn-primary" onclick="share()" style="font-size:12px">📤 分享给朋友</button>
    <div style="font-size:9px;color:rgba(240,236,228,.2);text-align:center;margin-top:4px;letter-spacing:1px">或点右上角 ··· 转发给好友</div>
    <div class="brand" style="margin-top:20px">
      <img src="${DATA.qrSrc}" alt="qr"/>
      <div>
        <div class="bn">灵客星球</div>
        <div class="bs">灵客星球 · 让AI为你所用</div>
      </div>
    </div>
  </div>`;
}

function go(){
  cur=0;over=false;A.innerHTML='<div class="fi">'+lv()+'</div>';
}

function lv(){
  if(over)return'';
  if(cur>=STAGES.length)return end();
  const s=STAGES[cur];
  const optsHtml=s.options.map((o,i)=>`<button class="opt" onclick="pk(${i})"><span class="il s${i+1}">${LABELS[i]}</span>${o}</button>`).join('');
  return `<div class="card fi">
    <div class="lv-hd">
      <span class="lv-name">⚠️ 第${cur+1}/${STAGES.length}关</span>
      <span class="lv-progress">💀 选错就输</span>
    </div>
    <div class="lv-scene">${s.scene}</div>
    <div class="lv-line">"${s.line}"</div>
    <div class="opts">${optsHtml}</div>
  </div>`;
}

function pk(i){
  if(over)return;
  const s=STAGES[cur];
  const isCorrect=(i+1)===s.safe;
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.style.pointerEvents='none');

  if(isCorrect){
    btns[i].classList.add('right');
    setTimeout(()=>{cur++;A.innerHTML='<div class="fi">'+lv()+'</div>';},500);
  } else {
    btns[i].classList.add('wrong');
    document.body.classList.add('shake');
    over=true;
    sv(DATA.title,Math.min(cur+1,STAGES.length),false);
    setTimeout(()=>{A.innerHTML=end()},700);
  }
}

function end(){
  if(over){
    const lvl=Math.min(cur+1,STAGES.length);

    const s=STAGES[Math.min(cur,STAGES.length-1)];
    return `<div class="go-screen fi">
      <span class="go-icon">💀</span>
      <div class="go-title">挽回失败</div>
      <div class="go-sub">你在第${Math.min(cur+1,STAGES.length)}关说错了话</div>
      ${statsHTML(lvl)}
      <div class="go-desc">${s.death}</div>
      <div class="go-qr"><img src="${DATA.qrSrc}" alt="扫码聊"/></div>
      <div class="go-brand">灵客星球</div>
      <button class="btn btn-danger" onclick="go()">🔄 再试一次</button>
      <div style="height:6px"></div>
      <button class="btn btn-primary" onclick="share()">📤 分享给朋友</button>
      <div style="font-size:9px;color:rgba(240,236,228,.2);text-align:center;margin-top:4px;letter-spacing:1px">或点右上角 ··· 转发给好友</div>
    </div>`;
  }
    sv(DATA.title,STAGES.length,true);
  return `<div class="win-screen fi">
    <span class="win-icon">🎉</span>
    <div class="win-title">恭喜通关！</div>
    <div style="font-size:12px;color:rgba(240,236,228,.3);margin:4px 0 14px">你成功挽回了${DATA.title}的心</div>
    ${statsHTML(STAGES.length)}
    <div class="win-desc">${DATA.winDesc}</div>
    <div class="win-qr"><img src="${DATA.qrSrc}" alt="扫码聊"/></div>
    <div class="win-brand">灵客星球</div>
    <button class="btn btn-primary" onclick="cap()">📸 保存战绩</button>
    <div style="height:8px"></div>
    <button class="btn btn-second" onclick="go()">🔄 再测一次</button>
    <div style="height:6px"></div>
    <button class="btn btn-primary" onclick="share()">📤 分享给朋友</button>
    <div style="font-size:9px;color:rgba(240,236,228,.2);text-align:center;margin-top:4px;letter-spacing:1px">或点右上角 ··· 转发给好友</div>
  </div>`;
}


function share(){
  const url=window.location.href;
  const title='挽回'+DATA.title+'挑战';
  const txt='我正在挑战【挽回'+DATA.title+'】！你能闯到第几关？来试试吧 👇';
  if(window.WeixinJSBridge && WeixinJSBridge.invoke){
    WeixinJSBridge.invoke('shareAppMessage',{title:title,desc:txt,link:url,imgUrl:''});
    return;
  }
  if(navigator.share){
    navigator.share({title:title,text:txt,url:url}).catch(function(){});
    return;
  }
  copyText(txt+' '+url);
  st('已复制，请点击右上角 ··· 分享到朋友圈');
}
function copyText(t){
  const e=document.createElement('textarea');
  e.value=decodeURIComponent(t);e.style.position='fixed';e.style.opacity='0';
  document.body.appendChild(e);e.select();
  try{document.execCommand('copy')}catch(e){}
  document.body.removeChild(e);
}
function st(m){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=m;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function cap(){
  if(typeof html2canvas==='undefined'){alert('请截图保存');return}
  const el=document.querySelector('.win-screen');
  if(!el)return;
  html2canvas(el,{backgroundColor:'#1a0f0a',scale:2,useCORS:true,logging:false}).then(function(c){
    c.toBlob(function(b){const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='拯回'+DATA.title+'-通关.png';a.click()});
  }).catch(function(){alert('截图失败请手动截图')});
}

hm();
</script>
